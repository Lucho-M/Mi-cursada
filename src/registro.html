<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Cursada · Crear Cuenta</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --teal:       #2DBD8A;
    --teal-dark:  #1a9e73;
    --teal-soft:  #e6f7f2;
    --navy:       #125092;
    --white:      #ffffff;
    --off-white:  #f5faf8;
    --border:     #c8e8de;
    --text-light: #6b9bb8;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--off-white);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .card-wrapper {
    display: flex;
    width: 900px;
    max-width: 98vw;
    min-height: 520px;
    border-radius: 18px;
    overflow: hidden;
    box-shadow: 0 8px 40px rgba(18,80,146,0.13);
  }
  .left-panel {
    background: linear-gradient(145deg, var(--teal) 0%, var(--teal-dark) 100%);
    width: 360px;
    flex-shrink: 0;
    padding: 48px 40px;
    display: flex;
    flex-direction: column;
  }
  .left-panel h1 { font-size: 1.7rem; font-weight: 700; color: var(--white); margin-bottom: 6px; }
  .subtitle { font-size: 0.85rem; color: rgba(255,255,255,0.75); margin-bottom: 30px; }
  label {
    display: block;
    font-size: 0.78rem;
    font-weight: 600;
    color: rgba(255,255,255,0.9);
    margin-bottom: 6px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .field-group { margin-bottom: 18px; }
  input, select {
    width: 100%;
    padding: 11px 15px;
    border: 1.5px solid rgba(255,255,255,0.35);
    border-radius: 8px;
    font-size: 0.9rem;
    font-family: 'DM Sans', sans-serif;
    color: var(--white);
    background: rgba(255,255,255,0.15);
    outline: none;
    transition: border-color 0.18s, background 0.18s;
    -webkit-appearance: none;
  }
  input::placeholder { color: rgba(255,255,255,0.5); }
  input:focus, select:focus {
    border-color: rgba(255,255,255,0.85);
    background: rgba(255,255,255,0.22);
  }
  select option { color: var(--navy); background: var(--white); }
  .select-wrap { position: relative; }
  .select-wrap::after {
    content: '▾';
    position: absolute;
    right: 14px; top: 50%;
    transform: translateY(-50%);
    color: rgba(255,255,255,0.7);
    pointer-events: none;
    font-size: 0.8rem;
  }
  .btn-continue {
    width: 100%;
    padding: 13px;
    background: rgba(255,255,255,0.2);
    border: 2px solid rgba(255,255,255,0.7);
    color: var(--white);
    border-radius: 8px;
    font-size: 0.95rem;
    font-weight: 600;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    margin-top: 24px;
    transition: background 0.18s;
  }
  .btn-continue:hover { background: rgba(255,255,255,0.3); }
  .steps { display: flex; gap: 8px; margin-top: auto; padding-top: 32px; }
  .step-dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,0.3); }
  .step-dot.active { background: var(--white); width: 24px; border-radius: 4px; }

  .right-panel {
    flex: 1;
    background: var(--white);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 48px 40px;
    text-align: center;
  }
  .brand { display: flex; align-items: center; gap: 14px; margin-bottom: 32px; }
  .brand-title { font-family: 'DM Serif Display', serif; font-size: 1.3rem; color: var(--teal); }
  .unab-badge {
    background: var(--navy);
    color: var(--white);
    font-size: 0.75rem;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 5px;
    letter-spacing: 0.04em;
    line-height: 1.3;
    text-align: center;
  }
  .unab-badge .sub { display: block; font-size: 0.55rem; font-weight: 400; opacity: 0.75; }
  .right-panel h2 { font-size: 2rem; font-weight: 700; color: var(--navy); margin-bottom: 14px; }
  .right-panel p { font-size: 0.88rem; color: var(--text-light); line-height: 1.65; margin-bottom: 32px; max-width: 260px; }
  .btn-group { display: flex; flex-direction: column; gap: 10px; width: 100%; max-width: 240px; }
  .btn-signin {
    padding: 12px;
    background: var(--teal);
    color: var(--white);
    border: none;
    border-radius: 8px;
    font-size: 0.9rem;
    font-weight: 600;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    transition: background 0.18s;
  }
  .btn-signin:hover { background: var(--teal-dark); }
  .btn-next {
    padding: 12px;
    background: var(--teal-soft);
    color: var(--teal-dark);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-size: 0.9rem;
    font-weight: 600;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    transition: background 0.18s;
  }
  .btn-next:hover { background: #d3f0e7; }
  .hint { font-size: 0.75rem; color: var(--text-light); margin-top: 10px; }
  @media (max-width: 680px) {
    .card-wrapper { flex-direction: column; border-radius: 12px; }
    .left-panel { width: 100%; padding: 32px 24px; }
    .right-panel { padding: 32px 24px; }
  }
</style>
</head>
<body>
<div class="card-wrapper">
  <div class="left-panel">
    <h1>Crear Cuenta</h1>
    <p class="subtitle">Completá tus datos para registrarte</p>
    <div class="field-group">
      <label for="dni">DNI</label>
      <input type="text" id="dni" placeholder="Ingresá tu DNI">
    </div>
    <div class="field-group">
      <label for="nombre">Nombre Completo</label>
      <input type="text" id="nombre" placeholder="Ingresá tu nombre">
    </div>
    <div class="field-group">
      <label for="carrera">Carrera que Cursás</label>
      <div class="select-wrap">
        <select id="carrera">
          <option value="" disabled selected>Seleccioná tu carrera</option>
          <option>Ingeniería en Sistemas</option>
          <option>Ingeniería Industrial</option>
          <option>Programación</option>
          <option>Administración</option>
          <option>Ciencias Económicas</option>
          <option>Comunicación Social</option>
        </select>
      </div>
    </div>
    <button class="btn-continue" onclick="alert('Paso 2: configurá tu contraseña')">Continuar</button>
    <div class="steps">
      <div class="step-dot active"></div>
      <div class="step-dot"></div>
    </div>
  </div>
  <div class="right-panel">
    <div class="brand">
      <span class="brand-title">Mi Cursada</span>
      <div class="unab-badge">unab<span class="sub">UNIVERSIDAD NACIONAL<br>GUILLERMO BROWN</span></div>
    </div>
    <h2>¡Bienvenido!</h2>
    <p>¿Ya tenés una cuenta? Iniciá sesión para continuar o completá el formulario para registrarte.</p>
    <div class="btn-group">
      <button class="btn-signin" onclick="window.location.href='login.html'">Iniciar sesión</button>
      <button class="btn-next" onclick="alert('Completá el formulario primero')">Siguiente Paso</button>
    </div>
    <p class="hint">Completá el formulario para continuar</p>
  </div>
</div>
</body>
</html>
