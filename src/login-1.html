<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Cursada · Iniciar Sesión</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F4F1EB;
    --ink: #125092;
    --ink-light: #6B6560;
    --primary: #1aab7a;
    --primary-dark: #148f65;
    --primary-light: #e6f7f2;
    --border: #D8D3CA;
    --card: #FDFBF7;
    --shadow: 0 4px 24px rgba(18,80,146,0.10);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .auth-shell {
    display: flex;
    width: 900px;
    min-height: 520px;
    border-radius: 18px;
    box-shadow: var(--shadow);
    overflow: hidden;
    background: var(--card);
  }

  /* LEFT FORM PANEL */
  .form-panel {
    flex: 1;
    padding: 48px 44px;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 36px;
  }
  .brand-name {
    font-family: 'DM Serif Display', serif;
    font-size: 1.2rem;
    color: var(--primary);
    letter-spacing: -0.01em;
  }
  .brand-logo {
    background: var(--ink);
    color: #fff;
    font-family: 'DM Sans', sans-serif;
    font-weight: 700;
    font-size: 0.85rem;
    padding: 6px 10px;
    border-radius: 6px;
    letter-spacing: 0.04em;
    line-height: 1;
  }
  .brand-logo span {
    display: block;
    font-size: 0.52rem;
    font-weight: 400;
    letter-spacing: 0.03em;
    opacity: 0.75;
    margin-top: 3px;
  }

  h2 {
    font-family: 'DM Sans', sans-serif;
    font-size: 1.6rem;
    font-weight: 700;
    color: var(--ink);
    margin-bottom: 6px;
  }
  .subtitle {
    font-size: 0.88rem;
    color: var(--ink-light);
    margin-bottom: 28px;
  }

  .field { margin-bottom: 18px; }
  .field label {
    display: block;
    font-size: 0.78rem;
    font-weight: 600;
    color: var(--primary);
    margin-bottom: 6px;
    letter-spacing: 0.01em;
  }
  .field input {
    width: 100%;
    padding: 11px 14px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    color: var(--ink);
    background: #fff;
    outline: none;
    transition: border-color 0.15s;
  }
  .field input::placeholder { color: #b0aaa5; }
  .field input:focus { border-color: var(--primary); }

  .forgot {
    font-size: 0.78rem;
    color: var(--primary);
    cursor: pointer;
    margin-bottom: 24px;
    display: inline-block;
  }
  .forgot:hover { text-decoration: underline; }

  .btn-login {
    width: 100%;
    padding: 13px;
    background: var(--primary);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
    letter-spacing: 0.01em;
  }
  .btn-login:hover { background: var(--primary-dark); }

  /* RIGHT GREEN PANEL */
  .green-panel {
    width: 320px;
    background: linear-gradient(145deg, #1aab7a 0%, #148f65 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 48px 40px;
    color: #fff;
    text-align: center;
  }

  .green-panel h3 {
    font-family: 'DM Sans', sans-serif;
    font-size: 2rem;
    font-weight: 700;
    margin-bottom: 16px;
  }
  .green-panel p {
    font-size: 0.9rem;
    opacity: 0.88;
    line-height: 1.55;
    margin-bottom: 32px;
  }
  .btn-register {
    padding: 12px 32px;
    border: 2px solid rgba(255,255,255,0.7);
    border-radius: 8px;
    background: transparent;
    color: #fff;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.01em;
  }
  .btn-register:hover { background: rgba(255,255,255,0.15); border-color: #fff; }
</style>
</head>
<body>

<div class="auth-shell">

  <!-- FORM -->
  <div class="form-panel">
    <div class="brand">
      <div class="brand-name">Mi Cursada</div>
      <div class="brand-logo">unab<span>Universidad Nacional<br>Guillermo Brown</span></div>
    </div>

    <h2>Iniciar Sesión</h2>
    <p class="subtitle">Ingresa tus datos para continuar</p>

    <div class="field">
      <label>DNI</label>
      <input type="text" placeholder="Ingresa tu DNI">
    </div>

    <div class="field">
      <label>Contraseña</label>
      <input type="password" placeholder="Ingresa tu contraseña">
    </div>

    <a class="forgot">¿Olvidaste tu contraseña?</a>

    <button class="btn-login">Ingresar</button>
  </div>

  <!-- GREEN PANEL -->
  <div class="green-panel">
    <h3>¡Hola!</h3>
    <p>¿No tenés cuenta? Registrate para acceder a todos los servicios</p>
    <button class="btn-register" onclick="window.location.href='registro.html'">Registrate</button>
  </div>

</div>

</body>
</html>
